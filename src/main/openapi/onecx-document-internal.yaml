---
openapi: 3.0.3
info:
  title: OneCX Document Internal API
  description: OneCX document management
  version: "1.0"
tags:
  - name: DocumentController
  - name: DocumentSpecificationController
  - name: DocumentTypeController
  - name: SupportedMimeTypeController
  - name: AttachmentController
paths:
  /internal/document/search:
    post:
      security:
        - oauth2: [ ocx-doc:all, ocx-doc:read ]
      tags:
        - DocumentController
      description: Gets documents by criteria
      operationId: getDocumentByCriteria
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentSearchCriteria'
      responses:
        "200":
          description: The corresponding documents resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentPageResult'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
  /internal/document:
    post:
      security:
        - oauth2: [ ocx-doc:all, ocx-doc:write]
      tags:
        - DocumentController
      description: Create Document
      operationId: createDocument
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentCreateUpdate'
      responses:
        "201":
          description: Created Document resource
          headers:
            Location:
              description: URL of the entity created
              style: simple
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentDetail'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
  /internal/document-specification:
    get:
      security:
        - oauth2: [ ocx-doc:all, ocx-doc:read ]
      tags:
        - DocumentSpecificationController
      description: Finds all specification of documents
      operationId: getAllDocumentSpecifications
      responses:
        "200":
          description: Found all specification of documents
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DocumentSpecification'
        "404":
          description: Not found
    post:
      security:
        - oauth2: [ ocx-doc:all, ocx-doc:write ]
      tags:
        - DocumentSpecificationController
      description: Creates specification of document
      operationId: createDocumentSpecification
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentSpecificationCreateUpdate'
      responses:
        "201":
          description: Created specification of document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentSpecification'
        "404":
          description: Not found
  /internal/document-specification/{id}:
    get:
      security:
        - oauth2: [ ocx-doc:all, ocx-doc:read ]
      tags:
        - DocumentSpecificationController
      description: Gets document specification by id
      operationId: getDocumentSpecificationById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentSpecification'
        "404":
          description: Not found
    put:
      security:
        - oauth2: [ ocx-doc:all, ocx-doc:write ]
      tags:
        - DocumentSpecificationController
      description: Updates specification of document by id
      operationId: updateDocumentSpecificationById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentSpecificationCreateUpdate'
      responses:
        "200":
          description: Updated specification of document by id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentSpecification'
        "404":
          description: Not found
    delete:
      security:
        - oauth2: [ ocx-doc:all, ocx-doc:delete ]
      tags:
        - DocumentSpecificationController
      description: Deletes specification of document by id
      operationId: deleteDocumentSpecificationById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted specification of document by id
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        "404":
          description: Not found
  /internal/document-type:
    get:
      security:
        - oauth2: [ ocx-doc:all, ocx-doc:read ]
      tags:
        - DocumentTypeController
      description: Finds all types of document
      operationId: getAllTypesOfDocument
      responses:
        "200":
          description: Found all types of document
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DocumentType'
        "404":
          description: Not found
    post:
      security:
        - oauth2: [ ocx-doc:all, ocx-doc:write ]
      tags:
        - DocumentTypeController
      description: Creates type of document
      operationId: createDocumentType
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentTypeCreateUpdate'
      responses:
        "201":
          description: Created type of document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentType'
        "404":
          description: Not found
  /internal/document-type/{id}:
    get:
      security:
        - oauth2: [ ocx-doc:all, ocx-doc:read ]
      tags:
        - DocumentTypeController
      description: Gets document type by id
      operationId: getDocumentTypeById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentType'
        "404":
          description: Not found
    put:
      security:
        - oauth2: [ ocx-doc:all, ocx-doc:write ]
      tags:
        - DocumentTypeController
      description: Updates type of document by id
      operationId: updateDocumentTypeById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentTypeCreateUpdate'
      responses:
        "201":
          description: Updated type of document by id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentType'
        "404":
          description: Not found
    delete:
      security:
        - oauth2: [ ocx-doc:all, ocx-doc:delete ]
      tags:
        - DocumentTypeController
      description: Deletes type of document by id
      operationId: deleteDocumentTypeById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted type of document by id
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        "404":
          description: Not found
  /internal/document/bulkupdate:
    put:
      security:
        - oauth2: [ ocx-doc:all, ocx-doc:write]
      tags:
        - DocumentController
      description: Bulk Update an document
      operationId: bulkUpdateDocument
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/DocumentCreateUpdate'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DocumentDetail'
        "404":
          description: Not found
  /internal/document/channels:
    get:
      security:
        - oauth2: [ ocx-doc:all, ocx-doc:read ]
      tags:
        - DocumentController
      description: Gets all channels
      operationId: getAllChannels
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Channel'
  /internal/document/delete-bulk-documents:
    delete:
      security:
        - oauth2: [ ocx-doc:all, ocx-doc:delete]
      tags:
        - DocumentController
      description: Delete Multiple Document by Ids
      operationId: deleteBulkDocuments
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                type: string
      responses:
        "204":
          description: Delete Documents by ids
        "404":
          description: Not found
  /internal/document/files/upload/failed/{id}:
    get:
      security:
        - oauth2: [ ocx-doc:all, ocx-doc:read]
      tags:
        - DocumentController
      description: Get data of all the failed attachment based on document ID
      operationId: getFailedAttachmentData
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StorageUploadAudit'
        "404":
          description: Not found
  /internal/document/search/show-all-documents:
    post:
      security:
        - oauth2: [ ocx-doc:all, ocx-doc:read]
      tags:
        - DocumentController
      description: Gets all documents by criteria
      operationId: showAllDocumentsByCriteria
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DocumentSearchCriteria"
      responses:
        "200":
          description: The corresponding documents resource
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DocumentDetail'
        "400":
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
  /internal/document/{id}:
    get:
      security:
        - oauth2: [ ocx-doc:all, ocx-doc:read]
      tags:
        - DocumentController
      description: Gets Document by Id
      operationId: getDocumentById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentDetail'
        "404":
          description: Not found
    put:
      security:
        - oauth2: [ ocx-doc:all, ocx-doc:write]
      tags:
        - DocumentController
      description: Update an document
      operationId: updateDocument
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DocumentCreateUpdate'
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DocumentDetail'
        "404":
          description: Not found
    delete:
      security:
        - oauth2: [ ocx-doc:all, ocx-doc:delete]
      tags:
        - DocumentController
      description: Delete Document by Id
      operationId: deleteDocumentById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted Document by id
        "404":
          description: Not found
  /internal/supported-mime-type:
    get:
      security:
        - oauth2: [ ocx-doc:all, ocx-doc:read ]
      tags:
        - SupportedMimeTypeController
      description: Finds all supported mime-types
      operationId: getAllSupportedMimeTypes
      responses:
        "200":
          description: Found all supported mime-types
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/SupportedMimeType'
        "404":
          description: Not found
    post:
      security:
        - oauth2: [ ocx-doc:all, ocx-doc:write ]
      tags:
        - SupportedMimeTypeController
      description: Creates supported mime-type
      operationId: createSupportedMimeType
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupportedMimeTypeCreateUpdate'
      responses:
        "201":
          description: Created supported mime-type
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportedMimeType'
        "404":
          description: Not found
  /internal/supported-mime-type/{id}:
    get:
      security:
        - oauth2: [ ocx-doc:all, ocx-doc:read ]
      tags:
        - SupportedMimeTypeController
      description: Gets supported mime-type by id
      operationId: getSupportedMimeTypeById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Ok
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportedMimeType'
        "404":
          description: Not found
    put:
      security:
        - oauth2: [ ocx-doc:all, ocx-doc:write ]
      tags:
        - SupportedMimeTypeController
      description: Updates supported mime-type by id
      operationId: updateSupportedMimeTypeById
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupportedMimeTypeCreateUpdate'
      responses:
        "200":
          description: Updated supported mime-type by id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupportedMimeType'
        "404":
          description: Not found
    delete:
      security:
        - oauth2: [ ocx-doc:all, ocx-doc:delete ]
      tags:
        - SupportedMimeTypeController
      description: Deletes supported mime-type by id
      operationId: deleteSupportedMimeTypeId
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted supported mime-type by id
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProblemDetailResponse'
        "404":
          description: Not found
  /internal/attachment/metadata:
    patch:
      security:
        - oauth2: [ ocx-doc:all, ocx-doc:write ]
      tags:
        - AttachmentController
      operationId: uploadAttachmentsMetadata
      description: Upload metadata for selected attachments
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/AttachmentMetadataUpload'
      responses:
        "200":
          description: Metadata updated
        "404":
          description: Resource not found
  /internal/attachment/storage-audit:
    post:
      security:
        - oauth2: [ ocx-doc:all, ocx-doc:write ]
      tags:
        - AttachmentController
      operationId: createStorageAuditsForAttachments
      description: Create storage audit log for failed attachments
      requestBody:
        content:
          application/json:
            schema:
              type: array
              items:
                $ref: '#/components/schemas/AttachmentStorageAuditRequest'
      responses:
        "201":
          description: Storage audit logs created
        "404":
          description: Resource not found
  /internal/attachment/{attachmentId}:
    get:
      security:
        - oauth2: [ ocx-doc:all, ocx-doc:read ]
      tags:
        - AttachmentController
      operationId: getAttachmentDetails
      description: get details of given attachment
      parameters:
        - name: attachmentId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Attachment'
        '404':
          description: Not found
components:
  securitySchemes:
    oauth2:
      type: oauth2
      flows:
        clientCredentials:
          tokenUrl: https://oauth.simple.api/token
          scopes:
            ocx-doc:all: Grants access to all operations
            ocx-doc:write: Grants access to write operations
            ocx-doc:read: Grants read access
            ocx-doc:delete: Grants access to delete operations

  schemas:
    AttachmentCreateUpdate:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        type:
          type: string
        validFor:
          $ref: '#/components/schemas/TimePeriod'
        mimeTypeId:
          type: string
        file:
          type: string
        fileName:
          type: string
    Attachment:
      type: object
      properties:
        modificationCount:
          format: int32
          type: integer
        creationDate:
          $ref: '#/components/schemas/OffsetDateTime'
        creationUser:
          type: string
        modificationDate:
          $ref: '#/components/schemas/OffsetDateTime'
        modificationUser:
          type: string
        id:
          type: string
        name:
          type: string
        description:
          type: string
        type:
          type: string
        size:
          type: number
        sizeUnit:
          $ref: '#/components/schemas/AttachmentUnit'
        validFor:
          $ref: '#/components/schemas/TimePeriod'
        mimeType:
          $ref: '#/components/schemas/SupportedMimeType'
        fileName:
          type: string
        storageUploadStatus:
          type: boolean
    AttachmentUnit:
      enum:
        - BYTES
      type: string
    CategoryCreateUpdate:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        categoryVersion:
          type: string
    Category:
      type: object
      properties:
        modificationCount:
          format: int32
          type: integer
        creationDate:
          $ref: '#/components/schemas/OffsetDateTime'
        creationUser:
          type: string
        modificationDate:
          $ref: '#/components/schemas/OffsetDateTime'
        modificationUser:
          type: string
        id:
          type: string
        name:
          type: string
        categoryVersion:
          type: string
    ChannelCreateUpdate:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
    Channel:
      type: object
      properties:
        modificationCount:
          format: int32
          type: integer
        creationDate:
          $ref: '#/components/schemas/OffsetDateTime'
        creationUser:
          type: string
        modificationDate:
          $ref: '#/components/schemas/OffsetDateTime'
        modificationUser:
          type: string
        id:
          type: string
        name:
          type: string
    DocumentCharacteristicCreateUpdate:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        value:
          type: string
    DocumentCharacteristic:
      type: object
      properties:
        modificationCount:
          format: int32
          type: integer
        creationDate:
          $ref: '#/components/schemas/OffsetDateTime'
        creationUser:
          type: string
        modificationDate:
          $ref: '#/components/schemas/OffsetDateTime'
        modificationUser:
          type: string
        id:
          type: string
        name:
          type: string
        value:
          type: string
    DocumentCreateUpdate:
      required:
        - name
        - typeId
        - channel
      type: object
      properties:
        modificationCount:
          format: int32
          type: integer
        creationDate:
          $ref: '#/components/schemas/OffsetDateTime'
        creationUser:
          type: string
        modificationDate:
          $ref: '#/components/schemas/OffsetDateTime'
        modificationUser:
          type: string
        id:
          type: string
        name:
          type: string
        description:
          type: string
        lifeCycleState:
          $ref: '#/components/schemas/LifeCycleState'
        documentVersion:
          type: string
        tags:
          uniqueItems: true
          type: array
          items:
            type: string
        typeId:
          type: string
        specification:
          $ref: '#/components/schemas/DocumentSpecificationCreateUpdate'
        channel:
          $ref: '#/components/schemas/ChannelCreateUpdate'
        documentRelationships:
          uniqueItems: true
          type: array
          items:
            $ref: '#/components/schemas/DocumentRelationshipCreateUpdate'
        characteristics:
          uniqueItems: true
          type: array
          items:
            $ref: '#/components/schemas/DocumentCharacteristicCreateUpdate'
        relatedParties:
          uniqueItems: true
          type: array
          items:
            $ref: '#/components/schemas/RelatedPartyRefCreateUpdate'
        relatedObject:
          $ref: '#/components/schemas/RelatedObjectRefCreateUpdate'
        categories:
          uniqueItems: true
          type: array
          items:
            $ref: '#/components/schemas/CategoryCreateUpdate'
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/AttachmentCreateUpdate'
    DocumentDetail:
      type: object
      properties:
        modificationCount:
          format: int32
          type: integer
        creationDate:
          $ref: '#/components/schemas/OffsetDateTime'
        creationUser:
          type: string
        modificationDate:
          $ref: '#/components/schemas/OffsetDateTime'
        modificationUser:
          type: string
        id:
          type: string
        name:
          type: string
        description:
          type: string
        lifeCycleState:
          $ref: '#/components/schemas/LifeCycleState'
        documentVersion:
          type: string
        channel:
          $ref: '#/components/schemas/Channel'
        tags:
          uniqueItems: true
          type: array
          items:
            type: string
        type:
          $ref: '#/components/schemas/DocumentType'
        specification:
          $ref: '#/components/schemas/DocumentSpecification'
        documentRelationships:
          uniqueItems: true
          type: array
          items:
            $ref: '#/components/schemas/DocumentRelationship'
        characteristics:
          uniqueItems: true
          type: array
          items:
            $ref: '#/components/schemas/DocumentCharacteristic'
        relatedParties:
          uniqueItems: true
          type: array
          items:
            $ref: '#/components/schemas/RelatedPartyRef'
        relatedObject:
          $ref: '#/components/schemas/RelatedObjectRef'
        categories:
          uniqueItems: true
          type: array
          items:
            $ref: '#/components/schemas/Category'
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/Attachment'
    DocumentSearchCriteria:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        lifeCycleState:
          type: array
          items:
            $ref: '#/components/schemas/LifeCycleState'
        documentTypeId:
          type: array
          items:
            type: string
        channelName:
          type: string
        startDate:
          type: string
        endDate:
          type: string
        createBy:
          type: string
        objectReferenceId:
          type: string
        objectReferenceType:
          type: string
        pageNumber:
          type: integer
          minimum: 0
          default: 0
        pageSize:
          type: integer
          minimum: 1
          maximum: 200
          default: 200
    DocumentRelationshipCreateUpdate:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
        documentRefId:
          type: string
    DocumentRelationship:
      type: object
      properties:
        modificationCount:
          format: int32
          type: integer
        creationDate:
          $ref: '#/components/schemas/OffsetDateTime'
        creationUser:
          type: string
        modificationDate:
          $ref: '#/components/schemas/OffsetDateTime'
        modificationUser:
          type: string
        id:
          type: string
        type:
          type: string
        documentRefId:
          type: string
    DocumentSpecificationCreateUpdate:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        specificationVersion:
          type: string
    DocumentSpecification:
      type: object
      properties:
        modificationCount:
          format: int32
          type: integer
        creationDate:
          $ref: '#/components/schemas/OffsetDateTime'
        creationUser:
          type: string
        modificationDate:
          $ref: '#/components/schemas/OffsetDateTime'
        modificationUser:
          type: string
        id:
          type: string
        name:
          type: string
        specificationVersion:
          type: string
    DocumentTypeCreateUpdate:
      required:
        - name
      type: object
      properties:
        name:
          type: string
    DocumentType:
      type: object
      properties:
        modificationCount:
          format: int32
          type: integer
        creationDate:
          $ref: '#/components/schemas/OffsetDateTime'
        creationUser:
          type: string
        modificationDate:
          $ref: '#/components/schemas/OffsetDateTime'
        modificationUser:
          type: string
        id:
          type: string
        name:
          type: string
    File:
      type: object
      properties:
        path:
          type: string
        invalid:
          type: boolean
        name:
          type: string
        parent:
          type: string
        parentFile:
          $ref: '#/components/schemas/File'
        absolute:
          type: boolean
        absolutePath:
          type: string
        absoluteFile:
