# DEFAULT
quarkus.datasource.db-kind=postgresql
quarkus.datasource.jdbc.max-size=30
quarkus.datasource.jdbc.min-size=10
quarkus.datasource.metrics.enabled=true

quarkus.http.auth.permission.health.paths=/q/*
quarkus.http.auth.permission.health.policy=permit
quarkus.http.auth.permission.default.paths=/*
quarkus.http.auth.permission.default.policy=authenticated

quarkus.liquibase.migrate-at-start=true
quarkus.liquibase.validate-on-migrate=true

quarkus.hibernate-orm.database.generation=validate
quarkus.hibernate-orm.multitenant=DISCRIMINATOR
quarkus.hibernate-orm.jdbc.timezone=UTC
quarkus.hibernate-orm.metrics.enabled=true

%prod.quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://postgresdb:5432/onecx-document?sslmode=disable}
%prod.quarkus.datasource.username=${DB_USER:onecx-document}
%prod.quarkus.datasource.password=${DB_PWD:onecx-document}

# Supported Mime Types
%prod.onecx.document.supported-mime-types=application/pdf,image/jpeg,image/jpg,image/png
# OIDC
%prod.quarkus.oidc-client.client-id=${quarkus.application.name}

# enable or disable multi-tenancy support
tkit.rs.context.tenant-id.enabled=true

# DEV
%dev.quarkus.hibernate-orm.log.sql=true
%dev.tkit.log.json.enabled=false
%dev.quarkus.http.host=0.0.0.0
%dev.quarkus.http.port=8080
%dev.quarkus.datasource.metrics.enabled=false
%dev.quarkus.hibernate-orm.metrics.enabled=false

## TEST
%test.quarkus.hibernate-orm.log.sql=false
%test.tkit.log.json.enabled=false
%test.quarkus.datasource.metrics.enabled=false
%test.quarkus.hibernate-orm.metrics.enabled=false

%test.tkit.rs.context.tenant-id.enabled=true
%test.tkit.rs.context.tenant-id.mock.enabled=true
%test.tkit.rs.context.tenant-id.mock.default-tenant=default
%test.tkit.rs.context.tenant-id.mock.claim-org-id=orgId
%test.tkit.rs.context.tenant-id.mock.data.org1=tenant-100
%test.tkit.rs.context.tenant-id.mock.data.org2=tenant-200
%test.onecx.document.supported-mime-types=application/pdf,image/jpg,image/png
# TEST-IT
quarkus.test.integration-test-profile=test
quarkus.test.enable-callbacks-for-integration-tests=true